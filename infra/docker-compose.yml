services:
  ministack:
    image: ministackorg/ministack:1.3-full
    container_name: ministack
    environment:
      MINISTACK_REGION: us-east-1
      PERSIST_STATE: "1"
      S3_PERSIST: "1"
      ATHENA_ENGINE: duckdb
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ministack_state:/tmp/ministack-state
      - ministack_s3:/tmp/ministack-data/s3

  seed-init:
    image: amazon/aws-cli:2.15.17
    container_name: seed-init
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://ministack:4566
      VEHICLE_DATA_BUCKET: vehicle-data
      VEHICLE_DATA_PREFIX: parquet/
      ATHENA_RESULTS_BUCKET: athena-results
    volumes:
      - ./resources/seed-s3.sh:/seed-s3.sh:ro
      - ./resources/bucket_data/parquet:/parquet:ro
    entrypoint: ["/bin/sh", "/seed-s3.sh"]
    depends_on:
      - ministack

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: api
    environment:
      AWS_ENDPOINT_URL: http://ministack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      VEHICLE_DATA_BUCKET: vehicle-data
      VEHICLE_DATA_PREFIX: parquet/
      ATHENA_OUTPUT_LOCATION: s3://athena-results/
    ports:
      - "8000:8000"
    # Resource limits — must stay within the challenge constraints.
    mem_limit: 1024m
    cpus: 0.5
    depends_on:
      ministack:
        condition: service_started
      seed-init:
        condition: service_completed_successfully

volumes:
  ministack_state:
  ministack_s3:
